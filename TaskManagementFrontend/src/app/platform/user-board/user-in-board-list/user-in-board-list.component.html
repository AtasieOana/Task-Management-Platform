<mat-list class="form-container" [style.position]="'absolute'" [style.top.px]="mouseY">
  <app-user-in-board (userListChanged)="onUsersListChanged()" [userShow]="user"  *ngFor="let user of users" [userBoard] = "userBoard" [alreadyExist]="alreadyExist"></app-user-in-board>
  <button type="button" class="close-button" (click)="close()">X</button>
  <button type="button" class="add-button" (click)="addUsersOnBoard()" [disabled]="alreadyExist"  *ngIf="userBoard.userType == 'admin'">
     Add collaborators</button>
</mat-list>
